<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLAYDEX</title>

  <!-- BOOTSTRAP -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FONTES -->
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <!-- ÍCONES -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- CORPO -->
<header class="header">
  <div class="container header-container">

    <h1 class="logo">PLAYDEX</h1>

    <!-- Barra de pesquisa -->
    <div class="search-box">
      <input type="text" placeholder="Buscar atleta...">
      <i class="fas fa-search"></i>
    </div>

    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">Atletas</a>
      <a href="#">Avaliações</a>
      <a href="#">Perfil</a>
    </nav>

  </div>
</header>

<!-- PRINCIPAL -->
<main class="container my-4">

  <div class="mb-4">
    <img src="https://picsum.photos/1200/400" class="img-fluid rounded" alt="Banner">
  </div>

  <div class="intro text-center mb-5">
    <h2>Recomendações</h2>
    <p>Descubra atletas com alto potencial e análise detalhada de desempenho.</p>
  </div>

  <section class="row g-4">

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card-custom">
        <img src="https://picsum.photos/400/200" alt="">
        <p>Kevin Lomónaco - ZAG (24)</p>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card-custom">
        <img src="https://picsum.photos/400/200" alt="">
        <p>Kees Smith - MEI (20)</p>
      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-4">
      <div class="card-custom">
        <img src="https://picsum.photos/400/200" alt="">
        <p>Michael Olise - ATA (24)</p>
      </div>
    </div>

  </section>

</main>

<!-- RODAPÉ -->
<footer class="footer text-center">
  <p>© 2026 PLAYDEX</p>
  <div>
    <a href="#">Instagram</a>
    <a href="#">Twitter</a>
    <a href="#">LinkedIn</a>
  </div>
</footer>

</body>
</html>
